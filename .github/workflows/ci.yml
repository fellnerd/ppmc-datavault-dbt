name: CI - Pull Request Validation

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'models/**'
      - 'macros/**'
      - 'seeds/**'
      - 'snapshots/**'
      - 'tests/**'
      - 'dbt_project.yml'
      - 'packages.yml'

env:
  DBT_PROFILES_DIR: ${{ github.workspace }}
jobs:
  validate:
    name: Validate dbt Project
    # Swap for [self-hosted, linux, dbt] if you run your own runner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-sqlserver

      # Azure login is only needed if your target server requires it
      # (e.g. Azure CLI authentication against Azure SQL). Remove this step
      # if you use SQL auth or a different warehouse.
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Create profiles.yml
        run: |
          mkdir -p $DBT_PROFILES_DIR
          cat > $DBT_PROFILES_DIR/profiles.yml << 'EOF'
          datavault:
            target: dev
            outputs:
              dev:
                type: sqlserver
                driver: 'ODBC Driver 18 for SQL Server'
                server: ppmcag-datavault.database.windows.net
                port: 1433
                database: datavault-dev
                schema: stg
                authentication: cli
                encrypt: true
                trust_cert: false
          EOF

      - name: Install dbt packages
        run: dbt deps

      - name: Validate connection
        run: dbt debug

      - name: Compile models
        run: dbt compile

      - name: Run tests
        run: dbt test
