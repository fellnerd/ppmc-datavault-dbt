name: Generate dbt Docs

on:
  push:
    branches: [main]
    paths:
      - 'models/**'
      - 'macros/**'
      - 'dbt_project.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  DBT_PROFILES_DIR: ${{ github.workspace }}
jobs:
  build:
    name: Generate Documentation
    # Swap for [self-hosted, linux, dbt] if you run your own runner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-sqlserver

      # Azure login is only needed if your target server requires it
      # (e.g. Azure CLI authentication against Azure SQL). Remove this step
      # if you use SQL auth or a different warehouse.
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Create profiles.yml
        run: |
          mkdir -p $DBT_PROFILES_DIR
          cat > $DBT_PROFILES_DIR/profiles.yml << 'EOF'
          datavault:
            target: dev
            outputs:
              dev:
                type: sqlserver
                driver: 'ODBC Driver 18 for SQL Server'
                server: ppmcag-datavault.database.windows.net
                port: 1433
                database: datavault-dev
                schema: stg
                authentication: cli
                encrypt: true
                trust_cert: false
          EOF

      - name: Install dbt packages
        run: dbt deps

      - name: Generate dbt docs
        run: dbt docs generate

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
