version: 2

models:
  - name: hub_role
    description: >
      Hub for company roles (Client/Contractor/Supplier). Starter example
      proving the Data Vault pipeline end-to-end; sourced from stg_role.
    columns:
      - name: hk_role
        description: Hash Key (Primary Key)
        data_type: char(64)
        data_tests:
          - not_null
          - unique
      - name: role_code
        description: Business Key
        data_type: nvarchar(4000)
        data_tests:
          - not_null
      - name: dss_load_date
        description: Load timestamp
        data_type: datetime2(7)
        data_tests:
          - not_null
      - name: dss_record_source
        description: Data source
        data_type: varchar(100)
        data_tests:
          - not_null

  - name: sat_role
    description: >
      Satellite holding descriptive attributes for hub_role, with
      hashdiff-based change detection.
    columns:
      - name: hk_role
        description: Hash Key (references hub_role)
        data_type: char(64)
        data_tests:
          - not_null
      - name: role_name
        description: Display name of the role
        data_type: nvarchar(4000)
      - name: role_description
        description: Description of the role
        data_type: nvarchar(4000)
      - name: dss_load_date
        description: Load timestamp
        data_type: datetime2(7)
        data_tests:
          - not_null
      - name: dss_record_source
        description: Data source
        data_type: varchar(100)
        data_tests:
          - not_null
